name: Deploy app.neurocarta.ai (Plesk)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-app-neurocarta-ai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PLESK_SSH_PORT }}" "${{ secrets.PLESK_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy app-placeholder/ to app.neurocarta.ai
        env:
          HOST: ${{ secrets.PLESK_HOST }}
          PORT: ${{ secrets.PLESK_SSH_PORT }}
          USER: ${{ secrets.PLESK_SSH_USER }}
          REMOTE_PATH: ${{ secrets.PLESK_APP_REMOTE_PATH }}
        run: |
          rsync -az --delete \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            -e "ssh -p ${PORT}" \
            "app-placeholder/" \
            "${USER}@${HOST}:${REMOTE_PATH}"

