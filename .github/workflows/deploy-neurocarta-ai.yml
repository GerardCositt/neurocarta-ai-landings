name: Deploy neurocarta.ai (Plesk)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-neurocarta-ai
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: neurocarta-conversion/package-lock.json

      - name: Install dependencies
        working-directory: neurocarta-conversion
        run: npm ci

      - name: Build
        working-directory: neurocarta-conversion
        run: npm run build

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLESK_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PLESK_SSH_PORT }}" "${{ secrets.PLESK_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dist/ to Plesk httpdocs
        env:
          HOST: ${{ secrets.PLESK_HOST }}
          PORT: ${{ secrets.PLESK_SSH_PORT }}
          USER: ${{ secrets.PLESK_SSH_USER }}
          REMOTE_PATH: ${{ secrets.PLESK_REMOTE_PATH }}
        run: |
          rsync -az --delete \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            -e "ssh -p ${PORT}" \
            "neurocarta-conversion/dist/" \
            "${USER}@${HOST}:${REMOTE_PATH}"

