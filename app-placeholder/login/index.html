<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroCarta.ai® — Iniciar sesión</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0f0f0f; color: #fff; }
      .wrap { max-width: 760px; margin: 0 auto; padding: 56px 20px; }
      .brand { font-weight: 800; letter-spacing: -0.02em; font-size: 18px; }
      .brand .ai { color: #ffc107; }
      .brand sup { font-size: 11px; color: rgba(255,255,255,.65); margin-left: 1px; }
      h1 { margin: 16px 0 10px; font-size: 34px; line-height: 1.1; letter-spacing: -0.02em; }
      p { margin: 0; color: rgba(255,255,255,.75); font-size: 16px; line-height: 1.55; }
      .card { margin-top: 18px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); border-radius: 14px; padding: 18px; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
      a.btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 16px; border-radius: 10px; text-decoration: none; font-weight: 800; }
      a.primary { background: #c52439; color: #fff; }
      a.secondary { border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.04); color: rgba(255,255,255,.9); }
      .micro { margin-top: 10px; font-size: 13px; color: rgba(255,255,255,.55); }
      code { color: rgba(255,255,255,.85); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand"><a href="/" style="color:inherit;text-decoration:none">NeuroCarta<span class="ai">.ai</span><sup>®</sup></a></div>
      <h1>Iniciar sesión</h1>
      <p>El login real se conectará aquí. Mientras tanto, este endpoint evita errores 404 y mantiene el botón de “Iniciar sesión” funcionando.</p>
      <div class="card">
        <div class="row">
          <a class="btn primary" href="mailto:hola@neurocarta.ai?subject=Acceso%20NeuroCarta.ai%C2%AE%20%2Flogin">Pedir acceso</a>
          <a class="btn secondary" href="https://neurocarta.ai">Volver a la web</a>
        </div>
        <div class="micro">Cuando tengamos el backend, aquí irá el formulario (email + contraseña).</div>
      </div>
    </div>
  </body>
</html>
