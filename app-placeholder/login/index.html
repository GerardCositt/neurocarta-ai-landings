<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroCarta.ai® — Iniciar sesión</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f0f0f;
        color: #fff;
      }
      .wrap { max-width: 960px; margin: 0 auto; padding: 56px 20px; }
      .brand { font-weight: 800; letter-spacing: -0.02em; font-size: 18px; text-align: center; }
      .brand .ai { color: #ffc107; }
      .brand sup { font-size: 11px; color: rgba(255,255,255,.65); margin-left: 1px; }
      h1 { margin: 18px 0 10px; font-size: 34px; line-height: 1.1; letter-spacing: -0.02em; text-align: center; }
      p { margin: 0; color: rgba(255,255,255,.72); font-size: 15px; line-height: 1.55; text-align: center; }

      .login-shell {
        margin: 26px auto 0;
        max-width: 420px;
        background: #f3f4f6;
        border-radius: 8px;
        padding: 22px 22px 18px;
        color: #111827;
        box-shadow: 0 24px 60px -30px rgba(0,0,0,.75);
      }
      .logo {
        display: flex;
        justify-content: center;
        margin: 0 0 14px;
        color: #111827;
        opacity: .9;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: .08em;
      }
      label { display:block; font-size: 12px; font-weight: 700; color: #111827; margin: 10px 0 6px; }
      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        padding: 10px 10px;
        outline: none;
        background: #fff;
      }
      input:focus { border-color: #111827; box-shadow: 0 0 0 3px rgba(17,24,39,.12); }
      .row { display:flex; align-items:center; justify-content: space-between; gap: 12px; margin-top: 10px; }
      .check { display:flex; align-items:center; gap: 8px; font-size: 12px; color: #374151; }
      .check input { width: 14px; height: 14px; }
      .actions { display:flex; align-items:center; justify-content: flex-end; gap: 12px; margin-top: 12px; }
      a.link { font-size: 12px; color: #6b7280; text-decoration: underline; text-underline-offset: 3px; }
      a.demo-link {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        border-radius: 6px;
        background: #c52439;
        color: #fff;
        padding: 10px 12px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 900;
      }
      .demo-account {
        margin-top: 14px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        padding: 10px;
        font-size: 12px;
        line-height: 1.5;
        color: #4b5563;
      }
      .demo-account strong { color: #111827; }
      .error {
        display: none;
        margin-top: 12px;
        border-radius: 6px;
        background: #fee2e2;
        color: #991b1b;
        padding: 9px 10px;
        font-size: 12px;
        font-weight: 700;
      }
      button {
        border: 0;
        background: #1f2937;
        color: #fff;
        font-weight: 800;
        padding: 9px 14px;
        border-radius: 6px;
        cursor: pointer;
      }
      button:active { transform: translateY(1px); }

      .micro {
        margin-top: 14px;
        text-align: center;
        font-size: 12px;
        color: rgba(255,255,255,.55);
      }
      .micro a { color: rgba(255,255,255,.75); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand"><a href="/" style="color:inherit;text-decoration:none">NeuroCarta<span class="ai">.ai</span><sup>®</sup></a></div>
      <h1>Iniciar sesión</h1>
      <p>Accede a tu panel. Si aún no tienes cuenta, pide acceso.</p>

      <div class="login-shell">
        <div class="logo">♞</div>
        <form id="login-form" action="/dashboard/" method="get">
          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" autocomplete="email" />

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="current-password" />

          <div class="row">
            <label class="check">
              <input type="checkbox" name="remember" />
              Mantener sesión activa
            </label>
            <span></span>
          </div>

          <div class="actions">
            <a class="link" href="mailto:hola@neurocarta.ai?subject=He%20olvidado%20mi%20contrase%C3%B1a%20%28NeuroCarta.ai%C2%AE%29">¿Olvidó su contraseña?</a>
            <button id="login-button" type="button">INICIAR SESIÓN</button>
          </div>
          <div id="login-error" class="error">Credenciales incorrectas para esta demo local.</div>
        </form>
        <div class="demo-account">
          Cuenta local demo<br />
          <strong>Email:</strong> demo@neurocarta.ai<br />
          <strong>Contraseña:</strong> NeuroCarta123
        </div>
        <a class="demo-link" href="/dashboard/?demo=1">Entrar directo a la demo local</a>
      </div>

      <div class="micro">
        ¿No tienes acceso? <a href="mailto:hola@neurocarta.ai?subject=Acceso%20NeuroCarta.ai%C2%AE%20%2Flogin">Pídelo aquí</a>.
      </div>
    </div>
    <script>
      const form = document.querySelector('#login-form');
      const emailInput = document.querySelector('#email');
      const passwordInput = document.querySelector('#password');
      const loginButton = document.querySelector('#login-button');
      const error = document.querySelector('#login-error');
      const demoEmail = 'demo@neurocarta.ai';
      const demoPassword = 'NeuroCarta123';

      function login() {
        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;

        if (email === demoEmail && password === demoPassword) {
          window.localStorage.setItem('neurocarta:demo-session', 'active');
          window.location.assign('/dashboard/');
          return;
        }

        error.style.display = 'block';
      }

      loginButton.addEventListener('click', login);

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        login();
      });
    </script>
  </body>
</html>
