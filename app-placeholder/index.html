<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroCarta.ai® — Acceso</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      :root { color-scheme: dark; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #0f0f0f; color: #fff; }
      .wrap { max-width: 880px; margin: 0 auto; padding: 56px 20px; }
      .brand { font-weight: 800; letter-spacing: -0.02em; font-size: 22px; }
      .brand .ai { color: #ffc107; }
      .brand sup { font-size: 12px; color: rgba(255,255,255,.65); margin-left: 1px; }
      h1 { margin: 22px 0 8px; font-size: 42px; line-height: 1.05; letter-spacing: -0.02em; }
      p { margin: 0; color: rgba(255,255,255,.75); font-size: 18px; line-height: 1.5; }
      .card { margin-top: 22px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.03); border-radius: 14px; padding: 18px; }
      .btns { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 10px; }
      a.btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 16px; border-radius: 10px; text-decoration: none; font-weight: 800; }
      a.primary { background: #c52439; color: #fff; }
      a.secondary { border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.04); color: rgba(255,255,255,.9); }
      .micro { margin-top: 10px; font-size: 13px; color: rgba(255,255,255,.55); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">NeuroCarta<span class="ai">.ai</span><sup>®</sup></div>
      <h1>Área privada</h1>
      <p>Este dominio es para el acceso a la app. Si necesitas entrar, solicita acceso.</p>
      <div class="card">
        <div class="btns">
          <a class="btn primary" href="/login/">Iniciar sesión</a>
          <a class="btn secondary" href="mailto:hola@neurocarta.ai?subject=Acceso%20NeuroCarta.ai%C2%AE">Pedir acceso</a>
        </div>
        <div class="micro">Si todavía no tienes cuenta, te respondemos en menos de 24h.</div>
      </div>
    </div>
  </body>
</html>
